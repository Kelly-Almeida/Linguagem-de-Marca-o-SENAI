<!DOCTYPE html>
<html lang="pt-BR">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <header>
        <h1>Pizzaria Boa Pizza</h1>
        <nav>Menu do site</nav>
    </header>

    
    <section>
        
        <form action="#" method="get">
            <h2>
                Cadastro de usuários
            </h2>

            <label for="Ccodigo">Código: </label>
            <input type="number" name="codigo" id="Ccodigo" value="123456" readonly>
            

            <label for="Cnome">Nome: </label>
            <input type="text" id="Cnome" name="nome" placeholder="Digite seu nome" required size="50" maxlength="12">
            
            <label for="Cemail">Email: </label>
            <input type="email" id="Cemail" name="email">
            <label for="Csenha">Senha: </label>
            <input type="password" id="Csenha" name="senha">

            <fieldset>
                <legend>Dados Pessoais</legend>

                <label for="CIdade">Idade: </label>
                <input type="number" min="18" max="80" name="idade">

                <label for="CdataNa">Data de nascimento: </label>
                <input type="date" id="CdataNa" name="dataNac">

                <label for="Cfoto">Foto: </label>
                <input type="file" accept="image/*" name="imagem">


                <label for="Ccor">Cor: </label>
                <input type="color" id="Ccor" name="cor">

                <label for="Cnivel">Nível: </label>
                <input type="range"  id="Cnivel" min="10" max="30" name="nivel">  
                

                <input type="checkbox" id="Cportugues" name="portugues">
                <label for="Cportugues">Português</label>

                <input type="checkbox" id="Cmatematica" checked name="matematica">
                <label for="Cmatematica">Matemática</label>


                <input type="radio" name="sexo" id="Cmasc" checked>
                <label for="Cmasc">Maculino</label>

                <input type="radio" name="sexo" id="Cfem" checked>
                <label for="Cfem">Feminino</label>


                <label for="Ccarros">Escolha um carro: </label>
                <select name="carro" id="Ccarros">
                    <option value="volvo">Volvo</option>
                    <option value="saab">Saab</option>
                    <option value="fiat">Fiat</option>
                    <option value="audi">Audi</option>
                </select>

            </fieldset>
            
            <input type="submit" value="Enviar" class="btn">
            <input type="reset" value="Resetar" class="btn">

        </form>
    </section>
    

    <footer>
        <p>Copyright @ 2026</p>
    </footer>
</body>
</html>
