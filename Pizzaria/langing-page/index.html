<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria Boa Pizza</title>
    <link rel="stylesheet" href="/Pizzaria/estilos/style.css">
    <link rel="stylesheet" href="/Pizzaria/estilos/style-land.css">
    <link rel="stylesheet" href="/Pizzaria/estilos/carrossel.css">
</head>
<body>
    <div id="container">
        <header>
            <div class="itemH1 caixaVermelha itemH1-mainTotal">
                <h1 class="h1Shadow fontAmarela">As melhores pizzas!</h1>
            </div>
            

            <div id="logo" class="itemlogo itemlogo-mainTotal" >
                <img src="/Pizzaria/imgs/logo.png" alt="Logo pizzaria Boa Pizza">
            </div>

            <nav class="itemNav nav-vertical" id="navegador-vertical">
                <div ><img src="/Pizzaria/icons/menu-hamburguer.png" alt="menu" id="menu-mobile" onclick="abrirMenu()"></div>

                <ul id ="menu-vertical">
                    <li id="fechar-mobile-li"><img src="/Pizzaria/icons/fechar.png" alt="Fechar" id="fechar-mobile" onclick="fecharMenu()"></li>
                    <li><a href="#"><img src="/Pizzaria/icons/icon-busca.png" alt="Busca"></a></li>
                    <li><a href="#"><img src="/Pizzaria/icons/icon-home.png" alt="Home"></a></li>
                    <li><a href="#"><img src="/Pizzaria/icons/icon-login.png" alt="Login"></a></li>
                    <li><a href="#"><img src="/Pizzaria/icons/icon-compras.png" alt="Compras"></a></li>
                    <li><a href="#"><img src="/Pizzaria/icons/icon-cad.png" alt="Cadastro"></a></li>
                </ul>
            </nav>
        </header>


        <main class="mainLand">
            <section class="conteudo-central figuras total-tela">

                <div class="carrosselGroup setsBetweenCarts bordaSupInf">

                    <div class="carrossel">
                        <figure class="itemCarrossel">
                                <img src="/Pizzaria/imgs/pizza-calabresa.png" alt="Pizza de calabresa">
                                <figcaption>Calabresa</figcaption>
                        </figure>

                        <figure class="itemCarrossel">
                            <img src="/Pizzaria/imgs/pizza-bacon.png" alt="Pizza com bacon">
                            <figcaption>Queijo com bacon</figcaption>
                        </figure>

                        <figure class="itemCarrossel">
                            <img src="/Pizzaria/imgs/pizza-calebresa-pi.png" alt="Pizza de calabresa picante">
                            <figcaption>Calabresa com pimenta</figcaption>
                        </figure>

                        <figure class="itemCarrossel">
                            <img src="/Pizzaria/imgs/pizza-queijo.png" alt="Pizza de queijo">
                            <figcaption>Queijo</figcaption>
                        </figure>

                        <figure class="itemCarrossel">
                            <img src="/Pizzaria/imgs/pizza-frango.png" alt="Pizza de frango">
                            <figcaption>Frango</figcaption>
                        </figure>

                        <figure class="itemCarrossel">
                            <img src="/Pizzaria/imgs/pizza-abacaxi.png" alt="Pizza com abacaxi">
                            <figcaption>Abacaxi especial</figcaption>
                        </figure>
                    </div>
                </div>
                    

                <div class="promos">
                    
                </div>
            </section>
            
            
        </main>


        <footer class="final">
            <ul>
                <li>Rua Sapa Karol, 69 - Ponta Grossa</li>
                <span class="ponto"></span>
                <li>(77) 69699-9696</li>
                <span class="ponto"></span>
                <li><a href="">vemComerM2026@rochadeira.com</a></li>
            </ul>
        </footer>
    </div>
</body>
</html>
