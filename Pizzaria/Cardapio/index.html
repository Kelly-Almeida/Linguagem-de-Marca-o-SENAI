<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="/Pizzaria/estilos/style.css">
    <link rel="stylesheet" href="/Pizzaria/estilos/style-land.css">
    <link rel="stylesheet" href="/Pizzaria/estilos/carrossel.css">
    <link rel="stylesheet" href="/Pizzaria/estilos/style-menu.css">
</head>
<body>
    <div id="container">
        <header>
            <div class="itemH1 caixaVermelha itemH1-mainTotal">
                <h1 class="h1Shadow fontAmarela">Nosso Cardápio</h1>
            </div>
            

            <div id="logo" class="itemlogo itemlogo-mainTotal" >
                <img src="/Pizzaria/imgs/logo.png" alt="Logo pizzaria Boa Pizza">
            </div>

            <nav class="itemNav nav-vertical" id="navegador-vertical">
                <div ><img src="/Pizzaria/icons/menu-hamburguer.png" alt="menu" id="menu-mobile" onclick="abrirMenu()"></div>

                <ul id ="menu-vertical">
                    <li id="fechar-mobile-li"><img src="/Pizzaria/icons/fechar.png" alt="Fechar" id="fechar-mobile" onclick="fecharMenu()"></li>
                    <li><a href="#"><img src="/Pizzaria/icons/icon-busca.png" alt="Busca"></a></li>
                    <li><a href="#"><img src="/Pizzaria/icons/icon-home.png" alt="Home"></a></li>
                    <li><a href="#"><img src="/Pizzaria/icons/icon-login.png" alt="Login"></a></li>
                    <li><a href="#"><img src="/Pizzaria/icons/icon-compras.png" alt="Compras"></a></li>
                    <li><a href="#"><img src="/Pizzaria/icons/icon-cad.png" alt="Menu"></a></li>
                    <li><a href="#"><img src="/Pizzaria/icons/cadastros.png" alt="Cadastros"></a></li>

                </ul>
            </nav>
        </header>


        <main class="mainLand">
            <section id="menu-produtos" class="conteudo-central figuras total-tela">

                <h2 class="hProdutos">combos</h2>
                <div class="combos">
                    <figure class="comboFigure">
                        <img src="/Pizzaria/imgs/combo-fritos.png" alt="Combo com pizza, batata frita, aneis de cebolas e frango fritos" class="comboImg">
                        <figcaption>
                            <h3 class="nomeProduto">Pizza + Fritinhos</h3>
                            <p class="preco">R$ 49,99</p>
                        </figcaption>
                    </figure>

                    <div class="janelaInfo">
                        <img src="/Pizzaria/imgs/combo-fritos.png" alt="Combo com pizza, batata frita, aneis de cebolas e frango fritos" class="comboImg">

                        <div class="fechar"><img src="/Pizzaria/icons/fechar.png" alt="Fechar"></div>

                        <div class="descricao">
                            <h3 class="nomeProduto hProdutos">Pizza + Fritinhos</h3>
                            <p class="precoJanelaInfo">R$ 49,99</p>
                        </div> 
                    </div>

                    <figure class="comboFigure">
                        <img src="/Pizzaria/imgs/combo-frango-salada.png" alt="Combo com pizza, salada e frango" class="comboImg">
                        <figcaption>
                            <h3 class="nomeProduto">Refeição completa com pizza!</h3>
                            <p class="preco">R$ 69,99</p>
                        </figcaption>
                    </figure>

                    <figure class="comboFigure">
                        <img src="/Pizzaria/imgs/combo-coxinhaFrango.png" alt="Combo com pizza e coxinhas de frango" class="comboImg">
                        <figcaption>
                            <h3 class="nomeProduto">Pizza + Nossas coxinhas</h3>
                            <p class="preco">R$ 59,99</p>
                        </figcaption>
                    </figure>

                    <figure class="comboFigure">
                        <img src="/Pizzaria/imgs/combo-refri.png" alt="Combo com pizza e refrigerante" class="comboImg">
                        <figcaption>
                            <h3 class="nomeProduto">Pizza + Refri</h3>
                            <p class="preco">R$ 39.99</p>
                        </figcaption>
                    </figure>

                </div>
                

                <div class="pizzas">

                </div>

                <div class="bebidas">

                </div>
            </section>
                
        </main>


        <footer class="final">
            <ul>
                <li>Rua Sapa Karol, 69 - Ponta Grossa</li>
                <span class="ponto"></span>
                <li>(77) 69699-9696</li>
                <span class="ponto"></span>
                <li><a href="">vemComerM2026@rochadeira.com</a></li>
            </ul>
        </footer>
    </div>
</body>
</html>
