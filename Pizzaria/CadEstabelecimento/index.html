<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de estabelecimento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <header>
            <h1 class="itemA">Estabelecimento</h1>

            <div id="logo" class="itemB">
                <img src="/Pizzaria/imgs/logo.png" alt="Logo pizzaria Boa Pizza">
            </div>

            <nav class="itemC">
                <ul>
                    <li><a href="#"><img src="/Pizzaria/icons/icon-busca.png" alt="Busca"></a></li>
                    <li><a href="#"><img src="/Pizzaria/icons/icon-home.png" alt="Home"></a></li>
                    <li><a href="#"><img src="/Pizzaria/icons/icon-login.png" alt="Login"></a></li>
                    <li><a href="#"><img src="/Pizzaria/icons/icon-compras.png" alt="Compras"></a></li>
                    <li><a href="#"><img src="/Pizzaria/icons/icon-cad.png" alt="Cadastro"></a></li>
                </ul>
            </nav>
        </header>


        <main>
            <form action="#">
                <label for="nome">Nome: </label> <input type="text" name="nome" placeholder="Boa pizza...">
                <label for="cnpj">CNPJ: </label> <input type="text" name="cnpj" placeholder="00.000.000/0000-00">
                <label for="instEstadual">Inscrição estadual: </label> <input type="text" name="instEstadual" placeholder="110.042.490.114">
                <label for="endereco">Endereço: </label> <input type="text" name="endereco" placeholder="Rua Sapa Karol, 69 - Ponta Grossa">
                <label for="telefone">Telefone: </label> <input type="tel" name="telefone" placeholder="(77) 6969-6969">
                <label for="email">Email: </label> <input type="email" name="email" placeholder="vemComerM2026@rochadeira.com">

                <input type="submit" value="Cancelar" class="btn">
                <input type="button" value="Cadastro" class="btn">
            </form>
        </main>

        <footer>
            <ul>
                <li>Rua Sapa Karol, 69 - Ponta Grossa</li>
                <li>(77) 69699-9696</li>
                <li><a href="">vemComerM2026@rochadeira.com</a></li>
            </ul>
        </footer>
</body>
</html>
