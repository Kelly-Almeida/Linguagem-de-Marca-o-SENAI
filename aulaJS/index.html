<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de cadastro</title>
    <script src="/aulaJS/script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="container">
        <main>
            <h1>Sistema de Cadastro de aluno</h1>
            <form id="formulario">
                <h2>Informações pessoais</h2>
                <div class="campo">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" placeholder="João Assis"> 
                </div>
                
                <div class="campo">
                    <label for="idade">Idade: </label>
                    <input type="number" min="0" max="120" name="idade" id="idade" placeholder=" 20">
                </div>
                
                <div class="campo">
                    <label for="curso">Curso:</label>
                    <select name="curso" id="curso">
                        <option value="ADS">Análise e desenvolvimento de sistemas</option>
                        <option value="BCC" selected>Bacharelado em ciência da computação</option>
                        <option value="BEC">Bacharelado em engenharia da computação</option>
                        <option value="BSI">Bacharelado em sistemas da informação</option>
                    </select>
                </div>

                <h2>Notas</h2>
                <div class="campo">
                    <label for="nota1">Primeira avaliação:</label>
                    <input type="number" id="nota1" name="nota1" max="10" min="0" placeholder="...">
                </div>

                <div class="campo">
                    <label for="nota2">Segunda avaliação:</label>
                    <input type="number" id="nota2" name="nota2" max="10" min="0" placeholder="...">
                </div>

                <div class="campo">
                    <label for="nota3">Terceira avaliação:</label>
                    <input type="number" id="nota3" name="nota3" max="10" min="0" placeholder="...">
                </div>

                <div class="campo">
                    <label for="nota4">Quarta avaliação:</label>
                    <input type="number" id="nota4" name="nota4" max="10" min="0" placeholder="...">
                </div>

                <div onclick="verDados()" id="btn">Enviar</div>

            </form>
            
            <table id="info"> 
                
            </table>
        </main>
        
    </div>
    

    
</body>
</html>
